<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>
    Temporarily Unavailable
  </title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="aurin-brand.js"></script>
</head>

<body class="font-sans bg-gradient-to-r from-gray-100 to-gray-200 md:min-h-screen flex items-center justify-center text-gray-800 antialiased">
  <div class="w-full max-w-xl mx-auto p-6 md:p-0">
    <div class="bg-white md:shadow md:rounded-lg md:border border-gray-200 overflow-hidden">

      <!-- AURIN brand stripe (guideline footer order) -->
      <div class="flex h-1.5">
        <div class="flex-1 bg-aurin-cobalt"></div>
        <div class="flex-1 bg-aurin-orange"></div>
        <div class="flex-1 bg-aurin-gold"></div>
        <div class="flex-1 bg-aurin-green"></div>
        <div class="flex-1 bg-aurin-blue"></div>
        <div class="flex-1 bg-aurin-turquoise"></div>
        <div class="flex-1 bg-aurin-light-cobalt"></div>
      </div>

      <div class="p-6 md:p-8">
        <div class="text-center">
          <img src="aurin-logo.png" alt="AURIN" class="mx-auto mb-4 h-14 w-auto" />

          <h1 class="text-xl tracking-tight font-semibold text-aurin-cobalt">
            We'll be right back.
          </h1>
          <p class="mt-1 text-sm text-aurin-grey tracking-tight">
            Our servers are currently getting a tune-up and will be back up soon. We're sorry for the inconvenience!
          </p>
          <p class="hidden mt-2 text-sm text-aurin-grey tracking-tight">
            If the issue persists, please open a
            <a class="text-aurin-cobalt hover:underline" href="mailto:support@aurin.org.au?subject=Internal Error | Ray ID:::RAY_ID::&body=Describe what you were doing when you noticed this error...">
              support ticket.
            </a>
          </p>
        </div>

        <div class="mt-6 border-t pt-6">
          <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 shadow-inner">
            <p class="text-xs tracking-tight text-gray-600 font-medium">
              Technical Details
            </p>
            <div class="mt-2 text-gray-400 text-sm">
              <div>
                <span>
                  ::CLOUDFLARE_ERROR_500S_BOX::
                </span>
              </div>
              <div class="text-gray-400 text-sm">
                <p>
                  Ray ID: ::RAY_ID::
                </p>
                <p>
                  Client IP: ::CLIENT_IP::
                </p>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-8 text-xs text-gray-400 border-t pt-4">
          <p>
            <a href="https://aurin.org.au/" class="text-aurin-cobalt hover:underline">aurin.org.au</a>
          </p>
        </div>
      </div>

    </div>
  </div>
</body>

</html>
